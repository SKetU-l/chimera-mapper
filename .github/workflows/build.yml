name: Build

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            bin_name: chimera-mapper-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            bin_name: chimera-mapper-macos-aarch64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_name: chimera-mapper-linux-x86_64

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install libudev
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/chimera-mapper release/${{ matrix.bin_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: release/${{ matrix.bin_name }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: binaries
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: release/*
